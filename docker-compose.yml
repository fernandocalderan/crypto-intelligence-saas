services:
  web:
    build:
      context: .
      dockerfile: infra/docker/web/Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      INTERNAL_API_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: infra/docker/api/Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-docker}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/crypto_intelligence
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-your-binance-api-key}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-your-binance-api-secret}
      BYBIT_API_KEY: ${BYBIT_API_KEY:-your-bybit-api-key}
      BYBIT_API_SECRET: ${BYBIT_API_SECRET:-your-bybit-api-secret}
      AUTH_SECRET: ${AUTH_SECRET:-replace-with-a-long-random-secret}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-price_pro_placeholder}
      STRIPE_PRICE_PRO_PLUS: ${STRIPE_PRICE_PRO_PLUS:-price_pro_plus_placeholder}
      ENABLE_STRIPE_MOCK_CHECKOUT: ${ENABLE_STRIPE_MOCK_CHECKOUT:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      ENABLE_ALERTS: ${ENABLE_ALERTS:-true}
      ENABLE_TELEGRAM_ALERTS: ${ENABLE_TELEGRAM_ALERTS:-true}
      ENABLE_EMAIL_ALERTS: ${ENABLE_EMAIL_ALERTS:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ALERT_MIN_SCORE: ${ALERT_MIN_SCORE:-7.0}
      ALERT_MIN_CONFIDENCE: ${ALERT_MIN_CONFIDENCE:-0.6}
      ALERT_DEDUPE_WINDOW_MINUTES: ${ALERT_DEDUPE_WINDOW_MINUTES:-5}
      ALERT_MAX_PER_RUN: ${ALERT_MAX_PER_RUN:-50}
      ALERTS_PROCESS_ON_SCHEDULER: ${ALERTS_PROCESS_ON_SCHEDULER:-true}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: crypto_intelligence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crypto_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
